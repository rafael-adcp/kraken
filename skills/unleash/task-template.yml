# Issue form for kraken. Copy to .github/ISSUE_TEMPLATE/task.yml in the
# coordination repo (see SKILL.md).
name: Task
description: A unit of work for a kraken worker
title: "<short imperative title>"
labels: ["kraken-task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: The desired end state and why it matters. Write it as an outcome, not a procedure — this is what the worker plans toward and restates as Assumptions before executing.
      placeholder: "Endpoint /v2/things returns cursor-paginated results so the mobile client can sync incrementally."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: Executable, observable proof that the Goal was met — exact commands/tests and their expected results. The worker must run these for real before the task moves forward, so anything a worker cannot execute on its own will stall the task.
      placeholder: "`npm test -- things.spec` passes; `curl :3000/v2/things?limit=2` returns 200 with a `next_cursor` field."
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Constraints, frozen contracts, gotchas (optional)
    validations:
      required: false
  - type: markdown
    attributes:
      value: >
        After creating the issue: **(1) add the `project:<name>` label** — workers
        are scoped to one project and will never see an unlabeled task; **(2)** set
        dependencies via the **Relationships** sidebar ("Mark as blocked by") or
        `gh issue edit <n> --add-blocked-by <m>`.
