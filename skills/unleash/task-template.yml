# Issue form for kraken. Copy to .github/ISSUE_TEMPLATE/task.yml in the
# coordination repo (see SKILL.md).
name: Task
description: A unit of work for a kraken worker
title: "<short imperative title>"
labels: ["kraken-task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What "done and correct" looks like
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: "Observable check: test passing, behavior, command output"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Constraints, frozen contracts, gotchas (optional)
    validations:
      required: false
  - type: markdown
    attributes:
      value: >
        After creating the issue: **(1) add the `project:<name>` label** — workers
        are scoped to one project and will never see an unlabeled task; **(2)** set
        dependencies via the **Relationships** sidebar ("Mark as blocked by") or
        `gh issue edit <n> --add-blocked-by <m>`.
