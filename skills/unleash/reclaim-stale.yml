# Reaper for kraken. Installed by `init` into the coordination repo as
# .github/workflows/reclaim-stale.yml (see SKILL.md).
#
# A worker that dies mid-task leaves its issue labeled in-progress forever. This
# runs server-side (so it works even when every worker is dead): any in-progress
# issue whose worker has been silent for MAX_HOURS is moved to needs-decision for
# the human to triage.
#
# The logic is NOT reimplemented in YAML: it runs `kraken.py reap` (the same
# program the worker side uses, vendored by `init`, unit-tested). reap is the
# reconciler between the claim refs (the lock) and the labels (the projection):
# staleness is anchored to the claim ref's commit date, NOT the issue's updatedAt
# (so an operator comment on a dead worker's issue shortens time-to-triage). It
# also deletes orphan locks, heals missing in-progress labels, and requeues
# in-progress labels with no ref behind them.
#
# contents: write is required — reap deletes claim refs (git refs ARE repo
# contents to the token) as well as editing issues.
#
# Why not actions/stale: its threshold is whole DAYS; a dead worker's claim must
# be reclaimed within hours.
name: Reclaim stale claims
on:
  schedule:
    - cron: "17 * * * *" # hourly; off-minute to dodge the top-of-hour crunch
  workflow_dispatch:

jobs:
  reclaim:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      MAX_HOURS: 6
    steps:
      - name: Check out the vendored kraken.py
        uses: actions/checkout@v4
      - name: Reconcile claim refs with labels (reclaim, heal, requeue)
        run: python3 .github/kraken.py reap "$GITHUB_REPOSITORY"
