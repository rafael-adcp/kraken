# Queue-entry quality gate for kraken. Installed by `init` into the coordination
# repo as .github/workflows/validate-task.yml (see SKILL.md).
#
# Makes the most common operator mistake — filing a task no worker will see, or
# that wastes a worker turn on arrival — non-silent. On a new (or edited/relabeled)
# kraken-task issue it checks three MUSTs and, when any is missing, posts ONE
# actionable comment saying exactly what to fix:
#   - carries a project:<name> label? (else invisible to every worker)
#   - has a non-empty Goal section?       (### Goal)
#   - has a non-empty Acceptance section? (### Acceptance)
#
# The logic is NOT reimplemented in YAML: it runs `kraken.py validate` (the same
# program the worker side uses, vendored by `init`). Section detection, the empty-
# field rule, the marker, and debounce all live there and are unit-tested.
#
# It INFORMS; the operator acts — never blocks, closes, or relabels. A compliant
# task gets no comment; a non-kraken-task issue is a no-op. Its comment is the
# Actions bot (user.type == Bot), so requeue-on-reply's Bot gate ignores it. A
# per-issue concurrency group serializes an edit burst. All four behaviors are
# pinned by tests/conformance/test_25_validate_task.py.
name: Validate task on arrival
on:
  issues:
    types: [opened, edited, labeled]

concurrency:
  group: validate-task-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  validate:
    # Coordination-repo task issues only; a non-kraken-task issue is a no-op.
    if: contains(github.event.issue.labels.*.name, 'kraken-task')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      NUM: ${{ github.event.issue.number }}
    steps:
      - name: Check out the vendored kraken.py
        uses: actions/checkout@v4
      - name: Flag a task missing its project label, Goal, or Acceptance
        run: python3 .github/kraken.py validate "$GITHUB_REPOSITORY" "$NUM"
