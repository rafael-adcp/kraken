# Auto-requeue for kraken. Installed by `init` into the coordination repo as
# .github/workflows/requeue-on-reply.yml (see SKILL.md).
#
# Collapses the operator's requeue gesture from "reply AND remove the label" to
# just "reply": when a genuine OPERATOR comment lands on a held task, this removes
# the holding label so a worker requeues it (forgetting the label used to strip a
# task from the queue forever).
#
# The logic is NOT reimplemented in YAML: it runs `kraken.py requeue-check` (the
# same program the worker side uses, vendored by `init`). The human-vs-tentacle
# discriminator, the held-state rules, and the requeue-directive check all live
# there, derived from its own constants and unit-tested.
#
# Two held states, handled asymmetrically:
#   - needs-decision: ANY bare operator comment requeues (it's almost always the answer).
#   - awaiting-merge: already DELIVERED, so left held UNLESS the comment carries an
#     explicit requeue directive — a `<!-- kraken {"type":"requeue"} -->` marker or
#     a standalone `requeue`/`requeue:` line.
#
# No-ops (see tests/conformance/test_18_requeue_on_reply.py): worker comments,
# comments on issues with no held label, and bot/self comments (user.type == Bot).
# Debounce is structural (label removal is idempotent); a per-issue concurrency
# group serializes a burst so two runs don't both confirm.
name: Requeue on operator reply
on:
  issue_comment:
    types: [created]

concurrency:
  group: requeue-on-reply-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  requeue:
    # Coordination-repo task issues only; never PR comments; skip bots at the
    # gate too (kraken.py re-checks, so the stub test can prove the no-op).
    if: >
      github.event.issue.pull_request == null &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.issue.labels.*.name, 'kraken-task')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      NUM: ${{ github.event.issue.number }}
      # Untrusted comment body/author reach kraken.py through the environment,
      # never argv — shell-injection discipline (a body could contain $(...)).
      COMMENT_BODY: ${{ github.event.comment.body }}
      COMMENT_AUTHOR_TYPE: ${{ github.event.comment.user.type }}
    steps:
      - name: Check out the vendored kraken.py
        uses: actions/checkout@v4
      - name: Requeue the task if a genuine operator comment arrived
        run: python3 .github/kraken.py requeue-check "$GITHUB_REPOSITORY" "$NUM"
