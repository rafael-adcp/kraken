# Auto-requeue for kraken. Installed by `init` into the coordination repo as
# .github/workflows/requeue-on-reply.yml (see SKILL.md).
#
# The operator's requeue gesture collapses from "reply AND remove the label" to
# just "reply". Forgetting the label used to strip a task forever: answer a
# needs-decision from your phone, forget the label, and the task never rejoins
# the queue. This workflow watches new comments and, when a genuine OPERATOR
# comment lands on a held task, removes the holding label so a worker requeues it.
#
# The logic is NOT reimplemented in YAML: it runs `kraken.py requeue-check`, the
# same stdlib-only transition program the worker side uses, vendored into the
# coordination repo by `init` (issue #37). The human-vs-tentacle discriminator
# (PROTOCOL.md §4's attribution disclaimer), the two held-state rules, and the
# structured requeue-directive check all live in kraken.py — derived from its own
# DISCLAIMER / marker constants, not a second hand-kept copy — and are covered by
# its unit tests, so this workflow shrinks to a checkout plus one exec.
#
# Two held states, handled asymmetrically (see the issue's Notes):
#   - needs-decision: a human comment is almost always the answer, so ANY bare
#     operator comment requeues.
#   - awaiting-merge: the task is already DELIVERED, so it is left held UNLESS the
#     comment carries an explicit, STRUCTURED requeue directive — a protocol/3
#     `<!-- kraken {"type":"requeue"} -->` marker, or a standalone
#     `requeue`/`requeue:` line.
#
# No-ops (all proven by tests/conformance/test_18_requeue_on_reply.py): worker comments
# (disclaimer present), comments on issues carrying no held label, and bot/self
# comments (the reaper's stale-claim comment, this workflow's own confirmation,
# the validator) — user.type == Bot.
#
# Debounce is structural: removing the holding label is idempotent, so a burst of
# operator comments requeues once. A per-issue concurrency group serializes the
# burst so two racing runs don't both post a confirmation.
name: Requeue on operator reply
on:
  issue_comment:
    types: [created]

concurrency:
  group: requeue-on-reply-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  requeue:
    # Coordination-repo task issues only; never PR comments; skip bots at the
    # gate too (kraken.py re-checks, so the stub test can prove the no-op).
    if: >
      github.event.issue.pull_request == null &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.issue.labels.*.name, 'kraken-task')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      NUM: ${{ github.event.issue.number }}
      # The untrusted comment body and its author type reach kraken.py through
      # the environment, never argv — the same shell-injection discipline the
      # inlined script kept (a comment could contain $(...) or backticks).
      COMMENT_BODY: ${{ github.event.comment.body }}
      COMMENT_AUTHOR_TYPE: ${{ github.event.comment.user.type }}
    steps:
      - name: Check out the vendored kraken.py
        uses: actions/checkout@v4
      - name: Requeue the task if a genuine operator comment arrived
        run: python3 .github/kraken.py requeue-check "$GITHUB_REPOSITORY" "$NUM"
