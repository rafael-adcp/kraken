# Cleanup for kraken. Installed by `init` into the coordination repo as
# .github/workflows/cleanup-closed.yml (see SKILL.md).
#
# Closing a task leaves whatever state-machine label it carried attached forever.
# This strips every label off a closed kraken-task issue except kraken-task and
# its project:<name>, so a closed issue reads clean and queue filters never pick
# up dead state.
#
# The logic is NOT reimplemented in YAML: it runs `kraken.py cleanup` (the same
# program the worker side uses, vendored by `init`, unit-tested). cleanup also
# deletes a leftover claim ref, so a closed task never leaves its lock behind —
# hence contents: write (git refs ARE repo contents to the token).
name: Cleanup closed task labels
on:
  issues:
    types: [closed]

jobs:
  cleanup:
    if: contains(github.event.issue.labels.*.name, 'kraken-task')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      NUM: ${{ github.event.issue.number }}
    steps:
      - name: Check out the vendored kraken.py
        uses: actions/checkout@v4
      - name: Strip labels other than kraken-task and project:<name>
        run: python3 .github/kraken.py cleanup "$GITHUB_REPOSITORY" "$NUM"
