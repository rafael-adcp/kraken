name: Conformance

# Mechanical proof of the queue protocol: the bundled transition program (kraken.py)
# runs against a stateful gh stub — claim guard, the claim-ref CAS race (exactly
# one winner), heartbeat/deliver/release, the reap reconciler, failure surfacing.
# Plus the kraken.py unit tests. All Python (the conformance suite was ported from
# bash in #41). No secrets, no tokens, no model calls (see #48 item 1).
on:
  pull_request:
    paths:
      - "skills/unleash/*.py"
      - "tests/**"
      - ".github/workflows/conformance.yml"
  push:
    branches: [main]

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the test suite (conformance + unit)
        # Native stdlib runner: two `unittest discover` passes (unit + conformance),
        # each printing its own `Ran N tests` summary. -v lists every test method so
        # the PR log shows each case running. The conformance suite self-skips when
        # jq is absent (harness.setUp); CI installs jq by default on ubuntu-latest.
        run: |
          python3 -m unittest discover -s tests/unit -p 'test_*.py' -v
          python3 -m unittest discover -s tests/conformance -p 'test_*.py' -v
