# One-click release, step 1 of 2: opens a release PR with the version bump.
# Merging that PR is the human approval — main is protected, so nothing lands
# without it. Step 2 (tag-release.yml) fires on the merge and publishes.
#
# Run it from the Actions tab: Release -> Run workflow -> pick the bump type.
name: Release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version in plugin.json
        id: bump
        run: |
          current=$(jq -r .version .claude-plugin/plugin.json)
          IFS=. read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) new="$((major+1)).0.0" ;;
            minor) new="$major.$((minor+1)).0" ;;
            *)     new="$major.$minor.$((patch+1))" ;;
          esac
          jq --arg v "$new" '.version = $v' .claude-plugin/plugin.json > tmp.json
          mv tmp.json .claude-plugin/plugin.json
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - name: Open the release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="release/v${{ steps.bump.outputs.new }}"
          git checkout -b "$branch"
          git add .claude-plugin/plugin.json
          git commit -m "chore(release): v${{ steps.bump.outputs.new }}"
          git push origin "$branch"
          gh pr create \
            --title "chore(release): v${{ steps.bump.outputs.new }}" \
            --body "Bumps the plugin version ${{ steps.bump.outputs.current }} -> ${{ steps.bump.outputs.new }}.

          Merging this PR publishes the release: the tag and the GitHub Release are created automatically (see tag-release.yml)."
